name: Shared Changelog Workflow

on:
  workflow_call:
    inputs:
      # WHY: Keep CLI-backed defaults in the CLI/action. Workflow-call defaults
      # would be forwarded as explicit values and override config-file settings.
      changelog_path:
        required: false
        type: string
      config_path:
        required: false
        type: string
      base_branch:
        required: false
        type: string
      provider:
        required: false
        type: string
      release_tag:
        required: false
        type: string
      release_name:
        required: false
        type: string
      release_body:
        required: false
        type: string
      language:
        required: false
        type: string
      instructions:
        required: false
        type: string
      instructions_file:
        required: false
        type: string
      minimum_package_age_days:
        required: false
        type: string
        default: '0'
      dry_run:
        required: false
        type: string
    secrets:
      REPO_TOKEN:
        required: true
      OPENAI_API_KEY:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Run changelog bot action
        uses: nyaomaru/changelog-bot@v0
        with:
          changelog-path: ${{ inputs.changelog_path }}
          config-path: ${{ inputs.config_path }}
          base-branch: ${{ inputs.base_branch }}
          provider: ${{ inputs.provider }}
          release-tag: ${{ inputs.release_tag }}
          release-name: ${{ inputs.release_name }}
          release-body: ${{ inputs.release_body }}
          language: ${{ inputs.language }}
          instructions: ${{ inputs.instructions }}
          instructions-file: ${{ inputs.instructions_file }}
          minimum-package-age-days: ${{ inputs.minimum_package_age_days }}
          dry-run: ${{ inputs.dry_run }}
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
